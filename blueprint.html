<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UK CoSec Platform — Full Product Blueprint</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  color-scheme: dark;
  --bg: #0A0E14; --bg2: #121820; --bg3: #1A2230; --bg4: #222C3C;
  --border: #2D3A4D; --text: #E8EDF4; --text2: #94A3B8; --text3: #64748B;
  --accent: #38BDF8; --accent-dim: #0C4A6E;
  --green: #34D399; --green-dim: #064E3B;
  --amber: #FBBF24; --amber-dim: #78350F;
  --purple: #A78BFA; --purple-dim: #4C1D95;
  --coral: #FB7185; --coral-dim: #881337;
  --font: 'Inter', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --radius: 10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scrollbar-color: #3D4F66 var(--bg); scrollbar-width: thin; }
body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.6; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #3D4F66; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #4A6078; }
::-webkit-scrollbar-corner { background: transparent; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

.site-header {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  height: 56px; display: grid; grid-template-columns: 220px minmax(0, 1fr);
  position: sticky; top: 0; z-index: 200;
}
.header-brand {
  display: flex; align-items: center; gap: 8px;
  padding: 0 0.75rem 0 1.25rem;
  border-right: 1px solid var(--border);
  min-width: 0;
}
.logo-icon {
  width: 28px; height: 28px; flex-shrink: 0;
  background: var(--accent-dim); border-radius: 7px;
  display: flex; align-items: center; justify-content: center; font-size: 14px;
}
.logo-text {
  font-size: 13px; font-weight: 700; line-height: 1.2;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.logo-badge {
  flex-shrink: 0; font-size: 9px; font-weight: 600;
  background: var(--green-dim); color: var(--green); border: 1px solid var(--green);
  padding: 2px 6px; border-radius: 10px; line-height: 1.3;
}
.nav-links {
  display: flex; align-items: center; justify-content: flex-end; gap: 16px;
  font-size: 13px; padding: 0 1.5rem;
}
.nav-links a { color: var(--text2); }
.nav-links a:hover { color: var(--accent); text-decoration: none; }

.layout {
  display: grid;
  grid-template-columns: 220px minmax(0, 1fr);
  width: 100%;
  min-height: calc(100vh - 56px);
}
.sidebar {
  background: var(--bg2);
  border-right: 1px solid var(--border);
  padding: 1rem 0;
  position: sticky;
  top: 56px;
  height: calc(100vh - 56px);
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: thin;
  scrollbar-color: #3D4F66 transparent;
}
.sidebar::-webkit-scrollbar { width: 5px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: #2D3A4D; border-radius: 4px; }
.sidebar::-webkit-scrollbar-thumb:hover { background: #4A6078; }
.sidebar-title { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; padding: 0 1.25rem 8px; }
.side-link {
  display: block; padding: 7px 1.25rem; font-size: 13px; color: var(--text2);
  border-left: 2px solid transparent; cursor: pointer;
}
.side-link:hover, .side-link.active { color: var(--accent); background: rgba(56,189,248,0.06); border-left-color: var(--accent); }

.main {
  padding: 1.25rem 1.5rem 3rem 1.25rem;
  overflow-x: hidden;
  min-width: 0;
  width: 100%;
}
.hero { margin-bottom: 2rem; }
.hero h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 8px; }
.hero h1 em { color: var(--accent); font-style: normal; }
.hero p { color: var(--text2); font-size: 14px; max-width: 900px; }
.hero-pills { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
.pill { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); color: var(--text2); }
.pill.new { border-color: var(--green); color: var(--green); background: var(--green-dim); }
.pill.better { border-color: var(--purple); color: var(--purple); background: var(--purple-dim); }

.stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin: 1.5rem 0 2rem; }
.stat-box { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; text-align: center; }
.stat-num { font-size: 22px; font-weight: 700; color: var(--accent); }
.stat-lbl { font-size: 10px; color: var(--text3); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }

.section { margin-bottom: 2.5rem; scroll-margin-top: 70px; }
.section-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.section-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.section-head h2 { font-size: 18px; font-weight: 700; }
.section-head span { font-size: 12px; color: var(--text3); margin-left: auto; }

.module-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
.module-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px 16px; transition: border-color 0.15s;
}
.module-card:hover { border-color: var(--accent); }
.module-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.module-card p { font-size: 12px; color: var(--text2); line-height: 1.55; margin-bottom: 10px; }
.tag { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
.tag.mvp { background: var(--green-dim); color: var(--green); border: 1px solid var(--green); }
.tag.p2 { background: var(--amber-dim); color: var(--amber); border: 1px solid var(--amber); }
.tag.p3 { background: var(--purple-dim); color: var(--purple); border: 1px solid var(--purple); }
.tag.new { background: var(--coral-dim); color: var(--coral); border: 1px solid var(--coral); }
.tag.id { background: var(--bg3); color: var(--text3); border: 1px solid var(--border); }

.tech-list { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-bottom: 8px; }
.feat-list { list-style: none; font-size: 12px; color: var(--text2); }
.feat-list li { padding: 3px 0 3px 16px; position: relative; }
.feat-list li::before { content: '→'; position: absolute; left: 0; color: var(--accent); font-size: 10px; top: 4px; }
.feat-list li.plus::before { content: '+'; color: var(--green); font-weight: 700; }
.feat-list li.gap::before { content: '◆'; color: var(--coral); }

.arch-box {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 1.25rem; font-family: var(--mono); font-size: 11px; color: var(--text2);
  line-height: 1.7; overflow-x: auto; white-space: pre; margin: 1rem 0;
}
.phase-timeline { display: flex; flex-direction: column; gap: 12px; }
.phase {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 16px 18px; border-left: 3px solid var(--accent);
}
.phase h3 { font-size: 14px; margin-bottom: 6px; }
.phase p { font-size: 12px; color: var(--text2); }
.phase ul { margin: 8px 0 0 18px; font-size: 12px; color: var(--text2); }

.compare-wrap {
  overflow-x: auto;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-top: 10px;
  scrollbar-width: thin;
  scrollbar-color: #3D4F66 var(--bg2);
}
.compare-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.compare-table th, .compare-table td { border: none; border-bottom: 1px solid var(--border); }
.compare-table tr:last-child td { border-bottom: none; }
.compare-table th, .compare-table td { padding: 10px 12px; text-align: left; vertical-align: top; }
.compare-table th { background: var(--bg3); color: var(--text); font-weight: 600; }
.compare-table td { color: var(--text2); }
.win { color: var(--green); font-weight: 600; }

.search-bar {
  width: 100%; max-width: 400px; background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 13px; margin-bottom: 1rem;
}
.search-bar:focus { outline: none; border-color: var(--accent); }

@media (max-width: 900px) {
  .site-header { grid-template-columns: 1fr; height: auto; min-height: 56px; }
  .header-brand { border-right: none; padding: 0.75rem 1rem; }
  .nav-links { padding: 0 1rem 0.75rem; gap: 12px; font-size: 12px; flex-wrap: wrap; justify-content: flex-start; }
  .layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .main { padding: 1rem; }
}
</style>
</head>

function moduleCard(m) {
  const phaseClass = m.phase === 'mvp' ? 'mvp' : 'p2';
  const phaseLabel = m.phase === 'mvp' ? 'Phase 1' : 'Phase 2';
  const extraTags = (m.tags || []).map(t =>
    t === 'gap' ? '<span class="tag id">ID gap</span>' :
    t === 'new' ? '<span class="tag new">Our edge</span>' : ''
  ).join('');
  const feats = m.features.map(f => {
    const cls = f.startsWith('+') ? 'plus' : f.includes('gap') || f.includes('Gap') ? 'gap' : '';
    return `<li class="${cls}">${f.replace(/^\+\s*/, '')}</li>`;
  }).join('');
  return `<div class="module-card" data-search="${(m.name + m.desc + m.tech + m.features.join(' ')).toLowerCase()}">
    <h3>${m.name} <span class="tag ${phaseClass}">${phaseLabel}</span>${extraTags}</h3>
    <div class="tech-list">${m.tech}</div>
    <p>${m.desc}</p>
    <ul class="feat-list">${feats}</ul>
  </div>`;
}
